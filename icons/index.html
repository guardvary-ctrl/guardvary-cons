<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guardvary Icons</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f4f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 2rem;
    }
    h1 { font-size: 1.3rem; color: #1a1a2e; }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
    }
    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .icon-card a {
      display: block;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      text-decoration: none;
    }
    .icon-card a:hover {
      border-color: #1e0e8c;
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(30,14,140,0.25);
    }
    .icon-card a:active {
      transform: scale(0.97);
    }
    .icon-card img {
      display: block;
    }
    .icon-card span {
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Guardvary Icons — Click to Visit</h1>

  <div class="grid">

    <div class="icon-card">
      <a href="icon-48x48.png" target="_blank">
        <img src="icon-48x48.png" width="48" height="48" alt="Guardvary 48px" />
      </a>
      <span>48 × 48</span>
    </div>

    <div class="icon-card">
      <a href="icon-72x72.png" target="_blank">

    </div>

    <div class="icon-card">
      <a href="icon-96x96.png" target="_blank">

      </a>
      <span>96 × 96</span>
    </div>

    <div class="icon-card">
      <a href="icon-128x128.png" target="_blank">
